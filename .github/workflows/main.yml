name: Build Flet APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK
        # Đây là chìa khóa để vượt qua lỗi cũ
        run: flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AtomicHabit-APK
          path: build/apk/*.apk
